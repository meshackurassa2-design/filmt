name: Build Sideload IPA (Modern Formula)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Capacitor iOS
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          # Generate icons/splash if they exist
          if [ -d "assets" ]; then
            npx @capacitor/assets generate --ios
          fi

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Build IPA using Fastlane (Sideload Formula)
        run: |
          # Move our robust formula into the newly generated iOS project
          mkdir -p ios/App/fastlane
          cp fastlane/Fastfile ios/App/fastlane/
          cd ios/App
          fastlane build_unsigned --verbose
        env:
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 5
          # Disable some checks that fail an unsigned CI build
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO

      - name: Upload Working Sideload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilamuTimes_Sideload_IPA
          path: build/FilamuTimes_Premium.ipa
          retention-days: 7
          if-no-files-found: error
