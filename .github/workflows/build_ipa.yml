name: Build Sideload IPA (Modern Formula)

on:
  push:
      branches: [ main ]
        workflow_dispatch:

        jobs:
          build:
              runs-on: macos-latest
                  steps:
                        - name: Checkout Repository
                                uses: actions/checkout@v4

                                      - name: Set up Ruby
                                              uses: ruby/setup-ruby@v1
                                                      with:
                                                                ruby-version: '3.2'
                                                                          bundler-cache: true

                                                                                - name: Install Fastlane
                                                                                        run: gem install fastlane

                                                                                              - name: Install Brew Dependencies
                                                                                                      run: |
                                                                                                                brew install cocoapods
                                                                                                                          
                                                                                                                                - name: Initialize Workspace
                                                                                                                                        run: |
                                                                                                                                                  cd ios/App
                                                                                                                                                            pod install
                                                                                                                                                                      cd ../..
                                                                                                                                                                      
                                                                                                                                                                            - name: Build IPA using Fastlane
                                                                                                                                                                                    run: fastlane build_unsigned
                                                                                                                                                                                            env:
                                                                                                                                                                                                      LC_ALL: en_US.UTF-8
                                                                                                                                                                                                                LANG: en_US.UTF-8
                                                                                                                                                                                                                
                                                                                                                                                                                                                      - name: Upload Working Sideload Artifact
                                                                                                                                                                                                                              uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                name: FilamuTimes_Sideload_IPA
                                                                                                                                                                                                                                                          path: FilamuTimes_Sideload.ipa
